<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BolaPulse — Jogos Ao Vivo</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --g: #00ff87; --g2: #00c853; --red: #ff3b3b; --blue: #00b4ff; --yellow: #ffd600;
  --bg: #080c0a; --surface: #0e1510; --card: #111a13; --border: #1a2b1d;
  --text: #e5f0e7; --muted: #4a6b4e; --muted2: #2d472f;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

header {
  padding:18px 24px 14px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); background:linear-gradient(180deg,#0b140d 0%,transparent 100%);
  position:sticky; top:0; z-index:50;
}
.brand { display:flex; align-items:center; gap:10px; }
.brand-icon { width:32px; height:32px; background:var(--g); border-radius:8px; display:flex; align-items:center; justify-content:center; }
.brand-name { font-family:'Bebas Neue',sans-serif; font-size:1.65rem; letter-spacing:2px; }
.brand-name span { color:var(--g); }

.refresh-btn { background:var(--border); border:1px solid var(--muted2); color:var(--g); border-radius:8px; padding:7px 13px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; }
.spin { animation:rotateSpin .8s linear infinite; display:inline-block; }
@keyframes rotateSpin { to{transform:rotate(360deg)} }

.tabs-row { display:flex; padding:0 24px; border-bottom:1px solid var(--border); overflow-x:auto; }
.tab { padding:12px 16px; font-size:0.7rem; font-weight:700; letter-spacing:1.2px; text-transform:uppercase; color:var(--muted); cursor:pointer; white-space:nowrap; }
.tab.active { color:var(--g); border-bottom:2px solid var(--g); }

.content { padding:20px 24px 60px; }
.section { display:none; }
.section.active { display:block; }

.match-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:15px; margin-bottom:10px; display:grid; grid-template-columns:1fr 100px 1fr; align-items:center; text-align:center; }
.team-logo { width:35px; height:35px; margin: 0 auto 5px; display:flex; align-items:center; justify-content:center; background:var(--muted2); border-radius:50%; font-size:10px; font-weight:bold; }
.team-logo img { width:100%; height:100%; object-fit:contain; }
.score-val { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; color:var(--g); }
.pill { font-size:0.6rem; padding:2px 8px; border-radius:10px; background:var(--muted2); text-transform:uppercase; }
.error-box { background:rgba(255,59,59,0.1); border:1px solid var(--red); color:#ff7575; padding:15px; border-radius:10px; margin-top:20px; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-icon">⚽</div>
    <div class="brand-name">Bola<span>Pulse</span></div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadAll(true)">
    <span id="refreshIcon">↻</span> Atualizar
  </button>
</header>

<div class="tabs-row">
  <div class="tab active" onclick="switchTab('all',this)">Geral</div>
  <div class="tab" onclick="switchTab('yest',this)">Ontem</div>
  <div class="tab" onclick="switchTab('today',this)">Hoje</div>
  <div class="tab" onclick="switchTab('tmr',this)">Amanhã</div>
</div>

<div class="content">
  <div id="main-content">
    <div class="section active" id="tab-all"></div>
    <div class="section" id="tab-yest"></div>
    <div class="section" id="tab-today"></div>
    <div class="section" id="tab-tmr"></div>
  </div>
</div>

<script>
async function fetchMatches(dateStr) {
  // Puxa os jogos da sua API interna passando a data
  const res = await fetch(`/api/matches?date=${dateStr}`);
  if (!res.ok) throw new Error(`Erro ao carregar.`);
  return await res.json();
}

function render(matches, containerId) {
    const container = document.getElementById(containerId);
    if(!container) return;
    
    if(!matches || matches.length === 0) {
        container.innerHTML = '<p style="text-align:center; opacity:0.5; padding:20px;">Nenhum jogo encontrado.</p>';
        return;
    }

    container.innerHTML = matches.map(m => {
        // Ajuste para os nomes de status da API-Football
        const status = m.fixture.status.short === 'FT' ? 'Encerrado' : 
                      (['1P', '2P', 'HT'].includes(m.fixture.status.short) ? 'AO VIVO' : 'Agendado');
        const home = m.teams.home;
        const away = m.teams.away;
        const goals = m.goals;

        return `
            <div class="match-card">
                <div>
                    <div class="team-logo"><img src="${home.logo}" alt="${home.name}"></div>
                    <div style="font-size:0.7rem;">${home.name}</div>
                </div>
                <div>
                    <div class="score-val">${goals.home ?? 0} - ${goals.away ?? 0}</div>
                    <span class="pill">${status}</span>
                </div>
                <div>
                    <div class="team-logo"><img src="${away.logo}" alt="${away.name}"></div>
                    <div style="font-size:0.7rem;">${away.name}</div>
                </div>
            </div>`;
    }).join('');
}

async function loadAll() {
    const icon = document.getElementById('refreshIcon');
    if(icon) icon.classList.add('spin');

    try {
        const now = new Date();
        const yest = new Date(now); yest.setDate(now.getDate() - 1);
        const tmr = new Date(now); tmr.setDate(now.getDate() + 1);

        // Formata as datas para YYYY-MM-DD
        const dToday = now.toISOString().split('T')[0];
        const dYest = yest.toISOString().split('T')[0];
        const dTmr = tmr.toISOString().split('T')[0];

        // Busca os dados para as 3 abas ao mesmo tempo
        const [mYest, mToday, mTmr] = await Promise.all([
            fetchMatches(dYest),
            fetchMatches(dToday),
            fetchMatches(dTmr)
        ]);

        render(mToday, 'tab-all'); 
        render(mYest, 'tab-yest');
        render(mToday, 'tab-today');
        render(mTmr, 'tab-tmr');

    } catch(err) {
        const target = document.getElementById('tab-all');
        if(target) target.innerHTML = `<div class="error-box">Erro: ${err.message}</div>`;
    } finally {
        if(icon) icon.classList.remove('spin');
    }
}

function switchTab(id, el) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    const target = document.getElementById('tab-' + id);
    if(target) target.classList.add('active');
    if(el) el.classList.add('active');
}

// Inicializa o site
loadAll();
</script>
</body>
</html>
